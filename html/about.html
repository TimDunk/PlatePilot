<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>PlatePilot - About Us</title>
	<meta name="description" content="PlatePilot is a one-stop food delivery and pickup platform.">
	<meta name="author" content="Drill Group">

	<!-- Bootstrap CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

	<!-- My CSS -->
	<link rel="stylesheet" href="../css/frame.css?v=1.0">
	<link rel="stylesheet" href="../css/about.css?v=1.0">
</head>

<body>
	<div id="head-placeholder"></div>

<!-- ========== About Us ====================================== -->
	<div class="container-fluid top-wrapper">
		<main class="row">
 		  	<div class="container about-container py-3">
 		    	<h1 class="text-center fw-bold mb-2">About PlatePilot</h1>

			    <div class="card about-card mb-3">
			      	<div class="card-body">
				        <h2>Our Platform</h2>
				        <p>PlatePilot is a one-stop food delivery and pickup platform.</p>
			      	</div>
			    </div>

<!-- ========== Join us ====================================== -->
			    <div class="card about-card mb-4">
			    	<div class="card-body">
			       		<h2>Join Us</h2>
	<!-- ========== Merchant Form ====================================== -->					
			       		<form id="merchantForm" class="mt-3">
			       		  	<div class="mb-2">
								
			            		<label for="name" class="visually-hidden">Full Name</label>
			            		<input type="text" class="form-control" id="name" placeholder="Name" required aria-required="true">
			          		</div>
			          		<div class="mb-2">
			            		<label for="phone" class="visually-hidden">Phone Number</label>
			            		<input type="tel" class="form-control" id="phone" placeholder="Phone" required aria-required="true">
			          		</div>
			          		<div class="mb-2">
			            		<label for="email" class="visually-hidden">Email Address</label>
			            		<input type="email" class="form-control" id="email" placeholder="Email" required aria-required="true">
			          		</div>
			          		<div class="mb-2">
			            		<label for="location" class="visually-hidden">Restaurant Location</label>
			            		<input type="text" class="form-control" id="location" placeholder="Restaurant Location" required aria-required="true">
			          		</div>
			          		<div class="mb-3">
			            		<label for="type" class="visually-hidden">Restaurant Type</label>
			            		<input type="text" class="form-control" id="type" placeholder="Restaurant Type" required aria-required="true">
			          		</div>
			     
			          		<button type="submit" class="button submit-btn w-100" id="submit-btn">Submit Information</button>
			       		</form>
			    	</div>
			    </div>

<!-- ========== Contact Us ====================================== -->
		    	<div class="card about-card mb-4">
		      		<div class="card-body">
		        		<h2>Contact Us</h2>
		        
		        		<p><strong>Email:</strong> <a href="mailto:contact@platepilot.com">contact@platepilot.com</a></p>
		        		<p><strong>Phone:</strong> <a href="tel:+3530890000111">+353 089 0000 111</a></p>
		      		</div>
		    	</div>
		  	</div>
		</main>
	</div>
	
	<div class="container-fluid footer top-wrapper">
		<hr>
		<footer class="row text-center">
			<p>Author: Drill Group</p>
		</footer>
	</div>

	<!-- ========== js ========== -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
	<script src="../js/head-section.js?v=1.0"></script>
	<script src="../js/about.js?v=1.0"></script>
</body>
</html>
